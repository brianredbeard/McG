// Builds a Ghidra Extension for a given Ghidra installation.
//
// An absolute path to the Ghidra installation directory must be supplied either by setting the 
// GHIDRA_INSTALL_DIR environment variable or Gradle project property:
//
//     > export GHIDRA_INSTALL_DIR=<Absolute path to Ghidra> 
//     > gradle
//
//         or
//
//     > gradle -PGHIDRA_INSTALL_DIR=<Absolute path to Ghidra>
//
// Gradle should be invoked from the directory of the project to build.  Please see the
// application.gradle.version property in <GHIDRA_INSTALL_DIR>/Ghidra/application.properties
// for the correction version of Gradle to use for the Ghidra installation you specify.

//----------------------START "DO NOT MODIFY" SECTION------------------------------
def ghidraInstallDir

if (System.env.GHIDRA_INSTALL_DIR) {
	ghidraInstallDir = System.env.GHIDRA_INSTALL_DIR
}
else if (project.hasProperty("GHIDRA_INSTALL_DIR")) {
	ghidraInstallDir = project.getProperty("GHIDRA_INSTALL_DIR")
}

if (ghidraInstallDir != null) {
	task distributeExtension {
		group "Ghidra"

		apply from: new File(ghidraInstallDir).getCanonicalPath() + "/support/buildExtension.gradle"
		dependsOn ':buildExtension'
	}
}
//----------------------END "DO NOT MODIFY" SECTION-------------------------------

// Apply Java plugin when Ghidra build system is not available (e.g., for tests)
if (ghidraInstallDir == null) {
	apply plugin: 'java'
}

// Read Java release target from Ghidra's application.properties
// so we never hardcode a version that drifts.
// Default to Java 21 if Ghidra installation is not available (e.g., for tests)
def javaRelease = 21
if (ghidraInstallDir != null) {
	def ghidraProps = new Properties()
	new File(ghidraInstallDir, "Ghidra/application.properties").withInputStream { ghidraProps.load(it) }
	javaRelease = ghidraProps.getProperty('application.java.compiler', '21') as int
}

tasks.withType(JavaCompile) {
	options.release = javaRelease
	options.compilerArgs.add('-parameters')
}

repositories {
	mavenCentral()
}

// Ghidra ships its own slf4j-api with NOPLoggerFactory. Spring Boot's
// starter-logging brings Logback, which conflicts at runtime. Exclude
// all logging implementations globally so Ghidra's SLF4J wins.
configurations.all {
	exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
	exclude group: 'ch.qos.logback'
	exclude group: 'org.apache.logging.log4j'
}

dependencies {
	// Any external dependencies added here will automatically be copied to the lib/ directory when
	implementation('org.springframework.boot:spring-boot-starter:3.3.6') {
		exclude group: 'org.springframework.boot', module: 'spring-boot-starter-tomcat'
	}
	implementation 'org.springframework.boot:spring-boot-starter-jetty:3.3.6'
	implementation('org.springframework.ai:spring-ai-mcp-server-webflux-spring-boot-starter:+') {
		exclude group: 'org.springframework.boot', module: 'spring-boot-starter-tomcat'
	}

	testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Exclude Ghidra-dependent files from compilation only when running standalone tests
// (when GHIDRA_INSTALL_DIR is not set)
if (ghidraInstallDir == null) {
	sourceSets {
		main {
			java {
				exclude '**/McpServerApplication.java'
				exclude '**/GhidraMCPPlugin.java'
				exclude '**/GhidraService.java'
			}
		}
	}
}

test {
	useJUnitPlatform()
}

clean {
	delete 'dist'
}

// Exclude additional files from the built extension
// Ex: buildExtension.exclude '.idea/**'
